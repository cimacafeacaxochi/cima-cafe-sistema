<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3d34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cima Café">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cima Café · Sistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --noche:#1e3d34;--noche-2:#264a40;--barro:#c5683f;--barro-soft:#e89b76;
  --niebla:#7ba89c;--luna:#e8b04b;--vainilla:#f7f1e3;--vainilla-2:#fdfaf2;
  --hoja:#3a6b54;--tinta:#26322d;--tinta-soft:#5e6b64;--linea:#e3dcc9;--linea-fuerte:#cfc6ad;
  --blanco:#fff;--ok:#3a8a5f;--ok-bg:#e6f2ea;--alerta:#c5683f;--alerta-bg:#fbeade;
  --peligro:#b3402f;--peligro-bg:#f9e4e0;--aviso:#a87a14;--aviso-bg:#fdf3da;
  --radio:14px;--radio-sm:10px;--sombra:0 2px 14px rgba(30,61,52,.08);--sombra-fuerte:0 8px 32px rgba(30,61,52,.16);
  --sans:'Outfit',system-ui,-apple-system,sans-serif;--display:'Fraunces',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);background:var(--vainilla);color:var(--tinta);font-size:16px;line-height:1.5;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--linea-fuerte);border-radius:10px}::-webkit-scrollbar-track{background:transparent}
#app{height:100%;display:flex;flex-direction:column}
.hidden{display:none!important}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--noche);color:var(--vainilla);flex-shrink:0}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:.3px}
.brand .mark{width:34px;height:34px;border-radius:50%;background:#F3E9D8;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.brand .mark svg{width:22px;height:22px}
.topbar .spacer{flex:1}
.sync-ind{display:flex;align-items:center;gap:7px;font-size:13px;background:rgba(247,241,227,.1);padding:6px 12px;border-radius:30px}
.sync-ind .dot{width:8px;height:8px;border-radius:50%;background:var(--niebla)}
.sync-ind.on .dot{background:#6fd99a}.sync-ind.off .dot{background:var(--barro-soft)}
.role-badge{display:flex;align-items:center;gap:8px;background:rgba(247,241,227,.12);padding:7px 14px;border-radius:30px;font-size:14px;font-weight:500}
.role-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--luna)}
.role-switch{background:rgba(247,241,227,.12);border-radius:30px;padding:7px 14px;font-size:14px;font-weight:500;color:var(--vainilla);display:flex;align-items:center;gap:6px;transition:background .15s}
.role-switch:hover{background:rgba(247,241,227,.22)}
.main{flex:1;display:flex;overflow:hidden}
.nav{width:230px;flex-shrink:0;background:var(--vainilla-2);border-right:1px solid var(--linea);padding:18px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:var(--radio-sm);font-size:15.5px;font-weight:500;color:var(--tinta-soft);transition:all .14s;text-align:left;width:100%}
.nav-item svg{width:21px;height:21px;flex-shrink:0;opacity:.75}
.nav-item:hover{background:var(--vainilla);color:var(--tinta)}
.nav-item.active{background:var(--noche);color:var(--vainilla)}.nav-item.active svg{opacity:1}
.nav-item .badge{margin-left:auto;background:var(--barro);color:#fff;font-size:12px;font-weight:600;min-width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 6px}
.nav-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--linea)}.nav-foot .nav-item{font-size:14px;padding:11px 15px}
.content{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column}
.view{flex:1;display:flex;flex-direction:column;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.view-head h1{font-family:var(--display);font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-.3px}
.view-head .sub{color:var(--tinta-soft);font-size:15px;margin-top:3px}
.view-head .actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:12px 20px;border-radius:var(--radio-sm);font-size:15px;font-weight:500;transition:all .14s;border:1.5px solid transparent;white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--noche);color:var(--vainilla)}.btn-primary:hover{background:var(--noche-2)}
.btn-barro{background:var(--barro);color:#fff}.btn-barro:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--blanco);border-color:var(--linea-fuerte);color:var(--tinta)}.btn-ghost:hover{border-color:var(--noche);background:var(--vainilla-2)}
.btn-sm{padding:8px 14px;font-size:14px;border-radius:9px}
.btn-icon{padding:9px;border-radius:9px;background:transparent;color:var(--tinta-soft)}.btn-icon:hover{background:var(--vainilla);color:var(--tinta)}.btn-icon svg{width:19px;height:19px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);padding:20px;box-shadow:var(--sombra)}
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:26px}
.metric{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);padding:18px 20px}
.metric .lbl{font-size:13.5px;color:var(--tinta-soft);font-weight:500;display:flex;align-items:center;gap:7px}.metric .lbl svg{width:16px;height:16px}
.metric .val{font-family:var(--display);font-size:30px;font-weight:600;margin-top:8px;line-height:1}
.metric .val.money::before{content:'$';font-size:19px;opacity:.5;margin-right:1px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 20px;color:var(--tinta-soft)}
.empty .ico{width:78px;height:78px;border-radius:50%;background:var(--vainilla-2);border:1.5px dashed var(--linea-fuerte);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty .ico svg{width:34px;height:34px;opacity:.5}
.empty h3{font-family:var(--display);font-size:21px;color:var(--tinta);font-weight:600;margin-bottom:7px}
.empty p{font-size:15px;max-width:380px;margin-bottom:20px;line-height:1.6}
.list{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);overflow:hidden;box-shadow:var(--sombra)}
.list-head,.list-row{display:grid;align-items:center;gap:14px;padding:15px 20px}
.list-head{background:var(--vainilla-2);font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tinta-soft);border-bottom:1px solid var(--linea)}
.list-row{border-bottom:1px solid var(--linea);transition:background .12s}.list-row:last-child{border-bottom:none}.list-row:hover{background:var(--vainilla-2)}
.list-row .name{font-weight:500}.list-row .muted{color:var(--tinta-soft);font-size:14px}
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:12.5px;font-weight:600}
.pill .dot{width:7px;height:7px;border-radius:50%}
.pill-ok{background:var(--ok-bg);color:var(--ok)}.pill-aviso{background:var(--aviso-bg);color:var(--aviso)}
.pill-alerta{background:var(--alerta-bg);color:var(--alerta)}.pill-neutro{background:var(--vainilla-2);color:var(--tinta-soft)}
.overlay{position:fixed;inset:0;background:rgba(30,61,52,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;animation:fade .18s ease;backdrop-filter:blur(2px)}
.modal{background:var(--vainilla-2);border-radius:var(--radio);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--sombra-fuerte);animation:pop .22s cubic-bezier(.2,.9,.3,1.3)}
.modal.wide{max-width:780px}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--linea)}
.modal-head h2{font-family:var(--display);font-size:22px;font-weight:600}
.modal-body{padding:24px}
.modal-foot{padding:18px 24px;border-top:1px solid var(--linea);display:flex;gap:10px;justify-content:flex-end;background:var(--blanco);position:sticky;bottom:0}
.field{margin-bottom:18px}
.field label{display:block;font-size:14px;font-weight:500;margin-bottom:7px;color:var(--tinta)}
.field .hint{font-size:13px;color:var(--tinta-soft);margin-top:5px}
.input,.select,textarea.input{width:100%;padding:12px 14px;border:1.5px solid var(--linea-fuerte);border-radius:var(--radio-sm);background:var(--blanco);color:var(--tinta);transition:border .14s}
.input:focus,.select:focus,textarea.input:focus{outline:none;border-color:var(--noche)}
textarea.input{resize:vertical;min-height:78px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-row.three{grid-template-columns:1fr 1fr 1fr}
.inline-add{display:flex;gap:8px;align-items:flex-end}.inline-add .field{flex:1;margin-bottom:0}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:2000;background:var(--noche);color:var(--vainilla);padding:14px 22px;border-radius:30px;font-size:14.5px;font-weight:500;box-shadow:var(--sombra-fuerte);opacity:0;transition:all .3s;display:flex;align-items:center;gap:9px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}#toast svg{width:18px;height:18px;flex-shrink:0}
.role-screen{position:fixed;inset:0;z-index:300;background:var(--noche);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;color:var(--vainilla);overflow-y:auto}
.role-screen .logo{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:36px}
.role-screen .logo .mark{width:96px;height:96px;border-radius:50%;background:#F3E9D8;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.role-screen .logo .mark svg{width:46px;height:46px}
.role-screen h1{font-family:var(--display);font-size:38px;font-weight:600;letter-spacing:.5px}
.role-screen .tag{color:var(--niebla);font-size:15px;margin-top:4px;letter-spacing:3px;text-transform:uppercase}
.role-screen .ask{font-size:17px;color:var(--vainilla);opacity:.85;margin-bottom:22px}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;max-width:620px;width:100%}
.role-card{background:rgba(247,241,227,.07);border:1.5px solid rgba(247,241,227,.18);border-radius:var(--radio);padding:26px 20px;transition:all .16s;color:var(--vainilla)}
.role-card:hover{background:rgba(247,241,227,.14);border-color:var(--luna);transform:translateY(-3px)}
.role-card .ico{width:54px;height:54px;border-radius:50%;background:rgba(247,241,227,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.role-card .ico svg{width:28px;height:28px}
.role-card .t{font-family:var(--display);font-size:20px;font-weight:600}
.role-card .d{font-size:13.5px;opacity:.7;margin-top:5px;line-height:1.45}
.role-foot{margin-top:30px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center}
.role-foot button{color:var(--niebla);font-size:14px;display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;border:1px solid rgba(247,241,227,.18)}
.role-foot button:hover{background:rgba(247,241,227,.1);color:var(--vainilla)}
.order-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;flex:1;min-height:0}
.menu-pick{display:flex;flex-direction:column;min-height:0}
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;flex-shrink:0}
.cat-tab{padding:9px 16px;border-radius:30px;background:var(--blanco);border:1.5px solid var(--linea-fuerte);font-size:14px;font-weight:500;white-space:nowrap;color:var(--tinta-soft)}
.cat-tab.active{background:var(--noche);color:var(--vainilla);border-color:var(--noche)}
.dish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;overflow-y:auto;padding-right:4px;align-content:start}
.dish{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio-sm);padding:15px;text-align:left;transition:all .13s;display:flex;flex-direction:column;gap:6px}
.dish:hover{border-color:var(--barro);transform:translateY(-2px);box-shadow:var(--sombra)}
.dish .dn{font-weight:500;font-size:15px;line-height:1.25}
.dish .dp{font-family:var(--display);font-weight:600;color:var(--hoja);font-size:17px}
.ticket{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);display:flex;flex-direction:column;min-height:0;box-shadow:var(--sombra)}
.ticket-head{padding:18px 20px;border-bottom:1px solid var(--linea)}.ticket-head .tt{font-family:var(--display);font-size:19px;font-weight:600}
.ticket-items{flex:1;overflow-y:auto;padding:8px 0}
.ti-row{padding:11px 20px;border-bottom:1px solid var(--linea)}.ti-row:last-child{border-bottom:none}
.ti-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.ti-name{font-weight:500;font-size:15px}
.ti-controls{display:flex;align-items:center;gap:9px;margin-top:7px}
.qty-btn{width:28px;height:28px;border-radius:8px;background:var(--vainilla-2);border:1px solid var(--linea-fuerte);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;color:var(--noche)}
.qty-btn:hover{background:var(--noche);color:var(--vainilla)}
.ti-mods{font-size:13px;color:var(--barro);margin-top:5px;cursor:pointer;display:flex;align-items:center;gap:5px}.ti-mods:hover{text-decoration:underline}
.ti-modtext{font-size:13px;color:var(--tinta-soft);margin-top:4px;font-style:italic}
.ticket-foot{padding:18px 20px;border-top:1px solid var(--linea);background:var(--vainilla-2);border-radius:0 0 var(--radio) var(--radio)}
.ticket-total{display:flex;justify-content:space-between;font-family:var(--display);font-size:22px;font-weight:600;margin-bottom:14px}
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;align-content:start}
.kds-card{background:var(--blanco);border-radius:var(--radio);border-top:5px solid var(--luna);box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column}
.kds-card.preparando{border-top-color:var(--barro)}.kds-card.lista{border-top-color:var(--ok)}
.kds-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--linea)}
.kds-head .mesa{font-family:var(--display);font-size:19px;font-weight:600}.kds-head .time{font-size:13px;color:var(--tinta-soft)}
.kds-items{padding:8px 18px;flex:1}.kds-item{padding:9px 0;border-bottom:1px solid var(--linea)}.kds-item:last-child{border-bottom:none}
.kds-item .qn{font-weight:500}.kds-item .qn b{color:var(--barro);margin-right:6px}.kds-item .mod{font-size:13px;color:var(--tinta-soft);font-style:italic;margin-top:2px}
.kds-foot{padding:12px 18px;display:flex;gap:8px}.kds-foot .btn{flex:1}
.recipe-line{display:grid;grid-template-columns:1fr 90px 56px 80px 40px;gap:9px;align-items:center;margin-bottom:8px}
.recipe-line .input,.recipe-line .select{padding:9px 11px}
.recipe-line .lc{font-size:13px;color:var(--hoja);font-weight:500;text-align:right}
.chip-add{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;background:var(--vainilla-2);border:1.5px dashed var(--linea-fuerte);font-size:14px;font-weight:500;color:var(--tinta-soft)}
.chip-add:hover{border-color:var(--noche);color:var(--noche)}
.cost-box{background:var(--vainilla-2);border-radius:var(--radio-sm);padding:14px 16px;margin-top:12px;display:flex;gap:20px;flex-wrap:wrap}
.cost-box .c{font-size:13px;color:var(--tinta-soft)}.cost-box .c b{display:block;font-family:var(--display);font-size:19px;color:var(--tinta);font-weight:600;margin-top:2px}
.mobile-nav{display:none}
@media(max-width:900px){.order-layout{grid-template-columns:1fr}.ticket{position:fixed;bottom:0;left:0;right:0;border-radius:var(--radio) var(--radio) 0 0;max-height:55vh;z-index:50}}
@media(max-width:760px){
  .nav{display:none}.content{padding:18px 16px 90px}.view-head h1{font-size:25px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--vainilla-2);border-top:1px solid var(--linea);padding:8px 4px;justify-content:space-around;overflow-x:auto}
  .mobile-nav .mn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 8px;border-radius:10px;font-size:10.5px;font-weight:500;color:var(--tinta-soft);flex:1;min-width:52px}
  .mobile-nav .mn svg{width:22px;height:22px}.mobile-nav .mn.active{color:var(--noche)}
  .topbar{padding:11px 14px;gap:8px}.brand{font-size:17px}.brand .mark{width:30px;height:30px}
  .sync-ind span{display:none}.role-badge span{display:none}.role-switch span{display:none}
  .metric-row{grid-template-columns:1fr 1fr}.field-row,.field-row.three{grid-template-columns:1fr}
  .list-head{display:none}.list-row{grid-template-columns:1fr auto!important;gap:8px}
  .modal{max-height:94vh}.recipe-line{grid-template-columns:1fr 70px 70px 36px;gap:7px}.recipe-line .lc{display:none}
}
</style>
</head>

<!-- ===== PANTALLA DE ROL / CONEXIÓN ===== -->

    else if(a.frases.length<=8 && a.frases.every(f=>FRASES_DEFAULT.includes(f))) a.frases=FRASES_DEFAULT.slice();
    if(!a.redes) a.redes={ ig:'cimacafe_acaxochitlan', fb:'Cima Café & Brunch', tt:'cima_cafe_acaxochitlan' };
    if(!a.promo) a.promo={ activa:false, texto:'Enseñando este ticket en tu siguiente visita obtienes 10% de descuento en un frappé.' };
    if(this.data.cajaActual===undefined) this.data.cajaActual=null;
    if(!this.data.cajas) this.data.cajas=[];
    if(this.data.menu.length===0 && this.data.categorias.length===0 && !this.data._cartaSeeded){ try{ seedCarta(false); }catch(e){ console.error(e); } }
    return this.data;
  }
};

async function sha256(txt){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(txt));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toast(msg, tipo='ok'){
  const t=$('#toast');
  const ic = tipo==='ok' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  t.innerHTML=ic+'<span>'+msg+'</span>'; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
}

function costoPlatillo(p){

}

}
function repintarPlatillos(){

  if(pl.length===0){ dg.innerHTML=`<div style="grid-column:1/-1;color:var(--tinta-soft);padding:30px;text-align:center">${q?'Nada encontrado para "'+estado.busqueda+'"':'No hay platillos en esta categoría.'}</div>`; return; }

function pintarTicketItems(){
  const cont=$('#ticketItems'); if(!cont) return; const b=estado.ordenBorrador;

      <div class="ti-mods" onclick="modificarItem(${i})">${svg(I.edit,14)}Nota para cocina</div>`;

function agregarItem(p){ const b=estado.ordenBorrador; const ex=b.items.find(it=>it.menuId===p.id&&(!it.mods||!it.mods.length)); if(ex) ex.cantidad++; else b.items.push({menuId:p.id,nombre:p.nombre,precio:p.precio,cantidad:1,mods:[]}); render(); }
function cambiarCant(i,delta){ const it=estado.ordenBorrador.items[i]; it.cantidad+=delta; if(it.cantidad<=0) estado.ordenBorrador.items.splice(i,1); render(); }
function quitarItem(i){ estado.ordenBorrador.items.splice(i,1); render(); }
function modificarItem(i){
  const it=estado.ordenBorrador.items[i];
  modal({ titulo:'Modificar platillo',
    cuerpo:`<div class="field"><label>${it.nombre}</label><div class="hint">Notas para cocina (sin cebolla, término medio…). Una por línea.</div></div>
      <div class="field"><textarea class="input" id="modText" placeholder="Una nota por línea">${(it.mods||[]).join('\n')}</textarea></div>`,
    guardar:()=>{ const t=$('#modText').value.trim(); it.mods=t?t.split('\n').map(s=>s.trim()).filter(Boolean):[]; cerrarModal(); render(); } });
}
function enviarOrden(){
  const b=estado.ordenBorrador, d=DB.data;
  if(!b.mesa){ toast('Selecciona una mesa','peligro'); return; }
  b.total=b.items.reduce((s,it)=>s+it.precio*it.cantidad,0);
  if(b._editando){ const idx=d.ordenes.findIndex(o=>o.id===b._editando); const prev=d.ordenes[idx];
    d.ordenes[idx]={...prev,mesa:b.mesa,items:b.items,total:b.total,nota:b.nota||'',comensales:b.comensales||''}; putDoc('ordenes',d.ordenes[idx]); toast('Orden actualizada'); }
  else { const o={id:b.id,folio:d.folio++,mesa:b.mesa,mesero:b.mesero,items:b.items,total:b.total,nota:b.nota||'',comensales:b.comensales||'',estado:'enviada',creada:ahora(),pagada:null};
    d.ordenes.push(o); putDoc('ordenes',o); saveAjustes(); toast('Orden enviada a cocina'); }
  estado.ordenBorrador=null; estado.busqueda=''; construirNav(); render();
}
function cobrarOrden(id){
  const o=DB.data.ordenes.find(x=>x.id===id); if(!o) return;
  const subtotal=o.items.reduce((s,it)=>s+it.precio*it.cantidad,0);
  estado._cobro={id,subtotal,descTipo:'none',descVal:0,cortesia:false,propina:0,recibido:0,forma:'Efectivo'};
  modal({ titulo:'Cobrar · '+(o.mesa||'#'+o.folio),
    cuerpo:`
      <div class="field"><label>Forma de pago</label>
        <select class="select" id="cForma" onchange="estado._cobro.forma=this.value;recalcCobro()"><option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option></select></div>
      <div class="field-row"><div class="field"><label>Descuento</label>
        <select class="select" id="cDescTipo" onchange="estado._cobro.descTipo=this.value;recalcCobro()"><option value="none">Sin descuento</option><option value="pct">Porcentaje %</option><option value="amt">Monto $</option></select></div>
        <div class="field"><label>Valor</label><input class="input" id="cDescVal" type="number" inputmode="decimal" placeholder="0" oninput="estado._cobro.descVal=parseFloat(this.value)||0;recalcCobro()"></div></div>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:16px"><input type="checkbox" id="cCortesia" onchange="estado._cobro.cortesia=this.checked;recalcCobro()" style="width:18px;height:18px;accent-color:var(--barro)">Marcar como <b>cortesía</b> (cuenta sin costo)</label>
      <div class="field-row"><div class="field"><label>Propina (opcional)</label><input class="input" id="cPropina" type="number" inputmode="decimal" placeholder="0" oninput="estado._cobro.propina=parseFloat(this.value)||0;recalcCobro()"></div>
        <div class="field" id="cEfectivoWrap"><label>Efectivo recibido</label><input class="input" id="cRecibido" type="number" inputmode="decimal" placeholder="0" oninput="estado._cobro.recibido=parseFloat(this.value)||0;recalcCobro()"></div></div>
      <div class="cost-box" id="cResumen" style="margin-top:0;flex-direction:column;gap:8px"></div>`,
    guardarTexto:'Confirmar e imprimir', guardar:confirmarCobro });
  recalcCobro();
}
function calcCobro(){
  const c=estado._cobro; let desc=0;
  if(c.descTipo==='pct') desc=c.subtotal*(c.descVal||0)/100; else if(c.descTipo==='amt') desc=c.descVal||0;
  desc=Math.min(Math.max(0,desc),c.subtotal);
  const total=c.cortesia?0:Math.max(0,+(c.subtotal-desc).toFixed(2));
  const descTotal=c.cortesia?c.subtotal:+desc.toFixed(2);
  const aPagar=+(total+(c.propina||0)).toFixed(2);
  const cambio=(c.forma==='Efectivo'&&c.recibido>0)?+(c.recibido-aPagar).toFixed(2):null;
  return {desc:descTotal,total,aPagar,cambio};
}
function recalcCobro(){
  const c=estado._cobro, r=calcCobro(), box=$('#cResumen'); if(!box) return;
  const wrap=$('#cEfectivoWrap'); if(wrap) wrap.style.display=c.forma==='Efectivo'?'':'none';
  const fila=(a,b,st='')=>`<div style="display:flex;justify-content:space-between;width:100%;${st}"><span>${a}</span><span>${b}</span></div>`;
  box.innerHTML = fila('Subtotal',money(c.subtotal))
    + (r.desc>0?fila('Descuento'+(c.cortesia?' (cortesía)':''),'− '+money(r.desc),'color:var(--barro)'):'')
    + fila('Total',money(r.total),'font-weight:600;font-size:18px')
    + (c.propina>0?fila('Propina',money(c.propina))+fila('A pagar',money(r.aPagar),'font-weight:600'):'')
    + (r.cambio!==null?fila('Cambio',money(r.cambio),'font-weight:600;color:'+(r.cambio>=0?'var(--hoja)':'var(--peligro)')):'');
}
function confirmarCobro(){
  const c=estado._cobro, o=DB.data.ordenes.find(x=>x.id===c.id); if(!o) return;
  const r=calcCobro();
  o.estado='pagada'; o.pagada=ahora(); o.formaPago=c.forma; o.subtotal=c.subtotal; o.descuento=r.desc; o.total=r.total; o.propina=c.propina||0; o.cortesia=c.cortesia;
  putDoc('ordenes',o);
  if(r.total>0){ const mov={id:uid(),tipo:'ingreso',monto:r.total,concepto:'Orden '+(o.mesa||'#'+o.folio)+' · '+c.forma,categoria:'Ventas',fecha:ahora(),ordenId:o.id,efectivo:c.forma==='Efectivo'}; DB.data.movimientos.push(mov); putDoc('movimientos',mov); }
  if(c.propina>0){ const mp={id:uid(),tipo:'ingreso',monto:c.propina,concepto:'Propina '+(o.mesa||'#'+o.folio),categoria:'Propina',fecha:ahora(),ordenId:o.id,efectivo:c.forma==='Efectivo'}; DB.data.movimientos.push(mp); putDoc('movimientos',mp); }
  if(DB.data.ajustes.deducirInventario) deducirInventario(o);
  estado._cobro=null; cerrarModal(); construirNav(); render(); imprimirTicket(o.id);
  toast(c.cortesia?'Cortesía registrada':'Cobro registrado · '+money(r.total));
}
function cancelarOrden(id){
  const o=DB.data.ordenes.find(x=>x.id===id); if(!o) return;
  modal({ titulo:'Cancelar orden · '+(o.mesa||'#'+o.folio),
    cuerpo:`<p style="line-height:1.6;margin-bottom:14px">Esta orden se marcará como cancelada y saldrá del piso.</p>
      <div class="field" style="margin-bottom:0"><label>Motivo (opcional)</label><input class="input" id="cancMotivo" placeholder="Cliente se retiró, error de captura…"></div>`,
    guardarTexto:'Sí, cancelar',
    guardar:()=>{ o.estado='cancelada'; o.motivoCancel=$('#cancMotivo').value.trim(); o.cancelada=ahora(); putDoc('ordenes',o); cerrarModal(); construirNav(); render(); toast('Orden cancelada'); } });
}
function deducirInventario(orden){
  orden.items.forEach(it=>{ const plat=DB.data.menu.find(m=>m.id===it.menuId); if(!plat||!plat.receta) return;
    plat.receta.forEach(r=>{ const ins=DB.data.inventario.find(i=>i.id===r.insumoId); if(ins){ ins.stock=Math.max(0,+(ins.stock-r.cantidad*it.cantidad).toFixed(3)); putDoc('inventario',ins); } }); });
}

/* ---------- COCINA ---------- */
function vCocina(c){
  const ords=DB.data.ordenes.filter(o=>['enviada','preparando','lista'].includes(o.estado)).sort((a,b)=>new Date(a.creada)-new Date(b.creada));
  c.innerHTML = head('Cocina','Órdenes entrantes');
  if(ords.length===0){ c.innerHTML += vacio(I.cocina,'Sin órdenes pendientes','Las órdenes que envíen los meseros aparecen aquí automáticamente.'); return; }
  const grid=document.createElement('div'); grid.className='kds-grid';
  ords.forEach(o=>{ const mins=Math.floor((Date.now()-new Date(o.creada))/60000);
    const card=document.createElement('div'); card.className='kds-card '+(o.estado==='lista'?'lista':o.estado==='preparando'?'preparando':'');
    let botones=''; if(o.estado==='enviada') botones=`<button class="btn btn-barro btn-sm" onclick="estadoOrden('${o.id}','preparando')">Empezar</button>`;
    else if(o.estado==='preparando') botones=`<button class="btn btn-primary btn-sm" onclick="estadoOrden('${o.id}','lista')">Marcar lista</button>`;
    else botones=`<button class="btn btn-ghost btn-sm" onclick="estadoOrden('${o.id}','preparando')">Reabrir</button>`;
    card.innerHTML=`<div class="kds-head"><span class="mesa">${o.mesa||'#'+o.folio}${o.comensales?` · ${o.comensales}p`:''}</span><span class="time">${mins} min · ${estadoPill(o.estado)}</span></div>
      ${o.nota?`<div style="background:var(--aviso-bg);color:var(--aviso);padding:8px 14px;font-size:13px;font-weight:500">${svg(I.edit,13)} ${o.nota}</div>`:''}
      <div class="kds-items">${o.items.map(it=>`<div class="kds-item"><div class="qn"><b>${it.cantidad}×</b>${it.nombre}</div>${it.mods&&it.mods.length?`<div class="mod">${it.mods.join(', ')}</div>`:''}</div>`).join('')}</div>

function saveCaja(){ persistLocal(); if(fbReady()) db.collection('meta').doc('caja').set({actual:DB.data.cajaActual,historial:DB.data.cajas}).catch(fbErr); }
function abrirCaja(){
  if(DB.data.cajaActual){ toast('La caja ya está abierta','peligro'); return; }
  modal({ titulo:'Abrir caja',
    cuerpo:`<div class="field" style="margin-bottom:0"><label>Fondo inicial (efectivo en caja)</label><input class="input" id="caFondo" type="number" inputmode="decimal" placeholder="0.00"><div class="hint">El dinero con el que arrancas el día.</div></div>`,
    guardarTexto:'Abrir caja',

      DB.data.cajaActual={id:uid(),fondoInicial:f,aperturaFecha:ahora(),aperturaPor:ROLES[estado.rol].nombre};

}
function labelDif(d){ if(Math.abs(d)<0.005) return 'Cuadra exacto ✓'; return (d>0?'Sobra ':'Falta ')+money(Math.abs(d)); }
function cerrarCaja(){
  const cj=DB.data.cajaActual; if(!cj){ toast('No hay caja abierta','peligro'); return; }
  const desde=new Date(cj.aperturaFecha);
  const movs=DB.data.movimientos.filter(m=>new Date(m.fecha)>=desde);
  const efeIn=movs.filter(m=>m.tipo==='ingreso'&&m.efectivo!==false).reduce((s,m)=>s+m.monto,0);
  const egr=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+m.monto,0);
  const ventas=movs.filter(m=>m.tipo==='ingreso'&&m.categoria==='Ventas').reduce((s,m)=>s+m.monto,0);
  const esperado=+(cj.fondoInicial+efeIn-egr).toFixed(2);
  const fila=(a,b,st='')=>`<div style="display:flex;justify-content:space-between;width:100%;${st}"><span>${a}</span><span>${b}</span></div>`;
  modal({ titulo:'Cerrar caja',
    cuerpo:`<div class="cost-box" style="flex-direction:column;gap:8px;margin-top:0;margin-bottom:16px">
        ${fila('Fondo inicial',money(cj.fondoInicial))}${fila('+ Ingresos en efectivo',money(efeIn))}${fila('− Egresos',money(egr))}${fila('Efectivo esperado',money(esperado),'font-weight:600;font-size:17px;border-top:1px solid var(--linea);padding-top:8px')}</div>
      <div class="field"><label>Efectivo contado en caja</label><input class="input" id="ccContado" type="number" inputmode="decimal" placeholder="0.00" oninput="document.getElementById('ccDif').textContent=labelDif((parseFloat(this.value)||0)-(${esperado}))"></div>
      <div class="field" style="margin-bottom:0"><label>Diferencia</label><div id="ccDif" style="font-family:var(--display);font-size:20px;font-weight:600">—</div></div>`,
    guardarTexto:'Cerrar e imprimir corte',
    guardar:()=>{ const contado=parseFloat($('#ccContado').value)||0; const dif=+(contado-esperado).toFixed(2);
      const corte={...cj,cierreFecha:ahora(),cierrePor:ROLES[estado.rol].nombre,esperado,contado,diferencia:dif,ventas,ingresosEfectivo:efeIn,egresos:egr};
      DB.data.cajas.unshift(corte); DB.data.cajaActual=null; saveCaja(); cerrarModal(); render(); imprimirCorte(corte); toast('Caja cerrada'); } });
}

/* ---------- REPORTES ---------- */
function rangoPeriodo(p){ const now=new Date(); const start=new Date(now);
  if(p==='hoy') start.setHours(0,0,0,0); else if(p==='semana') start.setDate(now.getDate()-7); else if(p==='quincena') start.setDate(now.getDate()-15); else start.setDate(now.getDate()-30);
  return [start, now];
}
function vReportes(c){
  const d=DB.data; const [ini,fin]=rangoPeriodo(estado.periodo);
  const enRango=fch=>{ const t=new Date(fch); return t>=ini&&t<=fin; };
  const pagadas=d.ordenes.filter(o=>o.estado==='pagada'&&o.pagada&&enRango(o.pagada));
  const movs=d.movimientos.filter(m=>enRango(m.fecha));
  const ventas=pagadas.reduce((s,o)=>s+o.total,0);
  const descuentos=pagadas.reduce((s,o)=>s+(o.descuento||0),0);
  const propinas=pagadas.reduce((s,o)=>s+(o.propina||0),0);
  const cortesias=pagadas.filter(o=>o.cortesia).length;
  const ingExtra=movs.filter(m=>m.tipo==='ingreso'&&!m.ordenId).reduce((s,m)=>s+m.monto,0);
  const egresos=movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+m.monto,0);
  const costoInsumos=pagadas.reduce((s,o)=>s+o.items.reduce((ss,it)=>{ const p=d.menu.find(m=>m.id===it.menuId); return ss+(p?costoPlatillo(p)*it.cantidad:0); },0),0);
  const ingresos=ventas+ingExtra; const utilidad=ingresos-egresos;
  const labels={hoy:'Hoy',semana:'Últimos 7 días',quincena:'Últimos 15 días',mes:'Últimos 30 días'};
  const tabs=['hoy','semana','quincena','mes'].map(p=>`<button class="cat-tab ${estado.periodo===p?'active':''}" onclick="estado.periodo='${p}';render()">${({hoy:'Día',semana:'Semanal',quincena:'Quincenal',mes:'Mensual'})[p]}</button>`).join('');
  c.innerHTML = head('Reportes', labels[estado.periodo]+' · '+ini.toLocaleDateString('es-MX',{day:'numeric',month:'short'})+' – '+fin.toLocaleDateString('es-MX',{day:'numeric',month:'short'}),
    `<button class="btn btn-ghost" onclick="exportarReporteExcel()">${svg(I.download,18)}Exportar a Excel</button>`);
  c.innerHTML += `<div class="cat-tabs" style="margin-bottom:22px">${tabs}</div>`;
  c.innerHTML += `<div class="metric-row">
    <div class="metric"><div class="lbl">Ventas</div><div class="val money">${num(ventas)}</div></div>
    <div class="metric"><div class="lbl">Órdenes</div><div class="val">${pagadas.length}</div></div>
    <div class="metric"><div class="lbl">Ticket promedio</div><div class="val money">${num(pagadas.length?ventas/pagadas.length:0)}</div></div>
    <div class="metric"><div class="lbl">Egresos</div><div class="val money">${num(egresos)}</div></div>
    <div class="metric"><div class="lbl">Costo de insumos</div><div class="val money">${num(costoInsumos)}</div></div>
    <div class="metric"><div class="lbl">Utilidad estimada</div><div class="val money" style="color:${utilidad>=0?'var(--hoja)':'var(--peligro)'}">${num(utilidad)}</div></div>
    <div class="metric"><div class="lbl">Descuentos</div><div class="val money">${num(descuentos)}</div></div>
    <div class="metric"><div class="lbl">Propinas</div><div class="val money">${num(propinas)}</div></div>
    <div class="metric"><div class="lbl">Cortesías</div><div class="val">${cortesias}</div></div></div>`;
  if(pagadas.length===0){ c.innerHTML += vacio(I.rep,'Sin ventas en este periodo','Cuando cobres órdenes en este rango, aquí verás el desglose y los platillos más vendidos.'); return; }
  const conteo={}; pagadas.forEach(o=>o.items.forEach(it=>{ conteo[it.nombre]=(conteo[it.nombre]||0)+it.cantidad; }));
  const top=Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,10); const max=top[0][1];
  const sec=document.createElement('div'); sec.className='card';

   EXPORTACIÓN A EXCEL (.xlsx)

function excelListo(){
  if(typeof XLSX==='undefined'){ toast('No se pudo cargar el módulo de Excel. Revisa tu conexión e intenta de nuevo.','peligro'); return false; }
  return true;
}
function hoja(wb,nombre,filas){
  const ws=XLSX.utils.json_to_sheet(filas.length?filas:[{}]);
  XLSX.utils.book_append_sheet(wb, ws, nombre.slice(0,31));
}
function exportarExcelCompleto(){
  if(!excelListo()) return;
  const d=DB.data; const wb=XLSX.utils.book_new();

  const ordenesRows=d.ordenes.filter(o=>o.estado==='pagada'||o.estado==='cancelada').map(o=>({
    Folio:o.folio, Fecha:new Date(o.pagada||o.cancelada||o.creada).toLocaleString('es-MX'),
    Mesa:o.mesa||'', Mesero:o.mesero||'', Estado:o.estado==='pagada'?'Pagada':'Cancelada',
    Personas:o.comensales||'', Subtotal:o.subtotal??'', Descuento:o.descuento||0, Propina:o.propina||0,
    Total:o.total??'', FormaPago:o.formaPago||'', Cortesia:o.cortesia?'Sí':'No', Nota:o.nota||'', MotivoCancelacion:o.motivoCancel||''
  }));
  hoja(wb,'Órdenes',ordenesRows);

  const detalleRows=[];
  d.ordenes.filter(o=>o.estado==='pagada').forEach(o=>{ o.items.forEach(it=>{
    detalleRows.push({ Folio:o.folio, Fecha:new Date(o.pagada||o.creada).toLocaleString('es-MX'), Mesa:o.mesa||'',
      Platillo:it.nombre, Cantidad:it.cantidad, PrecioUnitario:it.precio, Importe:+(it.precio*it.cantidad).toFixed(2), Notas:(it.mods||[]).join(', ') }); }); });
  hoja(wb,'Detalle de ventas',detalleRows);

  const invRows=d.inventario.map(i=>({ Insumo:i.nombre, Unidad:i.unidad||'', Existencia:i.stock||0, StockMinimo:i.stockMin||0,
    CostoPorUnidad:i.costo||0, ValorEnInventario:+((i.stock||0)*(i.costo||0)).toFixed(2) }));
  hoja(wb,'Inventario',invRows);

  const menuRows=d.menu.map(m=>{ const cat=d.categorias.find(c=>c.id===m.categoriaId); const costo=costoPlatillo(m);
    const margen=m.precio>0&&costo>0?Math.round((m.precio-costo)/m.precio*100):'';
    return { Platillo:m.nombre, Categoria:cat?cat.nombre:'Sin categoría', Precio:m.precio, CostoInsumos:costo>0?+costo.toFixed(2):'', MargenPct:margen, Activo:m.activo!==false?'Sí':'No' }; });
  hoja(wb,'Menú',menuRows);

  const movRows=d.movimientos.map(m=>({ Fecha:new Date(m.fecha).toLocaleString('es-MX'), Tipo:m.tipo==='ingreso'?'Ingreso':'Egreso',
    Concepto:m.concepto, Categoria:m.categoria||'', Monto:m.monto, Efectivo:m.efectivo===false?'No':'Sí' }));
  hoja(wb,'Movimientos de caja',movRows);

  const cajaRows=d.cajas.map(c=>({ Apertura:new Date(c.aperturaFecha).toLocaleString('es-MX'), AbrióPor:c.aperturaPor||'',
    Cierre:new Date(c.cierreFecha).toLocaleString('es-MX'), CerróPor:c.cierrePor||'', FondoInicial:c.fondoInicial,
    Ventas:c.ventas, IngresosEfectivo:c.ingresosEfectivo, Egresos:c.egresos, Esperado:c.esperado, Contado:c.contado, Diferencia:c.diferencia }));
  hoja(wb,'Cortes de caja',cajaRows);

  XLSX.writeFile(wb, 'cima-cafe-datos-'+hoy()+'.xlsx');
  toast('Excel descargado');
}
function exportarReporteExcel(){
  if(!excelListo()) return;
  const d=DB.data; const [ini,fin]=rangoPeriodo(estado.periodo);
  const enRango=fch=>{ const t=new Date(fch); return t>=ini&&t<=fin; };
  const pagadas=d.ordenes.filter(o=>o.estado==='pagada'&&o.pagada&&enRango(o.pagada));
  const movs=d.movimientos.filter(m=>enRango(m.fecha));
  const wb=XLSX.utils.book_new();

  hoja(wb,'Órdenes del periodo', pagadas.map(o=>({ Folio:o.folio, Fecha:new Date(o.pagada).toLocaleString('es-MX'), Mesa:o.mesa||'',
    Mesero:o.mesero||'', Subtotal:o.subtotal??'', Descuento:o.descuento||0, Propina:o.propina||0, Total:o.total??'', FormaPago:o.formaPago||'', Cortesia:o.cortesia?'Sí':'No' })));

  const conteo={}; pagadas.forEach(o=>o.items.forEach(it=>{ conteo[it.nombre]=(conteo[it.nombre]||0)+it.cantidad; }));
  hoja(wb,'Platillos vendidos', Object.entries(conteo).sort((a,b)=>b[1]-a[1]).map(([nombre,cant])=>({ Platillo:nombre, CantidadVendida:cant })));

  hoja(wb,'Movimientos', movs.map(m=>({ Fecha:new Date(m.fecha).toLocaleString('es-MX'), Tipo:m.tipo==='ingreso'?'Ingreso':'Egreso',
    Concepto:m.concepto, Categoria:m.categoria||'', Monto:m.monto })));

  const labels={hoy:'dia',semana:'semanal',quincena:'quincenal',mes:'mensual'};
  XLSX.writeFile(wb, 'cima-cafe-reporte-'+(labels[estado.periodo]||'periodo')+'-'+hoy()+'.xlsx');
  toast('Reporte descargado en Excel');
}

    <div class="center sm">${o.cortesia?'CORTESÍA de la casa ♥':'¡Buen provecho!'}</div>`);
}
function fraseAleatoria(){
  const f=DB.data.ajustes.frases||[]; if(!f.length) return '¡Gracias por su visita!';
  return f[Math.floor(Math.random()*f.length)];
}
function imprimirPrecuenta(id){
  const o=DB.data.ordenes.find(x=>x.id===id); if(!o) return; const a=DB.data.ajustes;

  const items=o.items.map(it=>`<tr><td>${it.cantidad}× ${it.nombre}</td><td class="r">${num(it.precio*it.cantidad)}</td></tr>`).join('');
  printDoc(`<div class="center b big">${a.nombre||'Cima Café'}</div>${a.direccion?`<div class="center sm">${a.direccion}</div>`:''}
    <hr><div class="center b">CUENTA</div>
    <div class="row sm"><span>${o.mesa||'#'+o.folio}${o.comensales?' · '+o.comensales+'p':''}</span><span>${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</span></div><hr>
    <table>${items}</table><hr>
    <div class="row big b"><span>TOTAL</span><span>$${num(subtotal)}</span></div><hr>
    <div class="center sm">Cuenta · no es comprobante de pago</div>
    ${(a.redes&&(a.redes.ig||a.redes.tt))?`<div class="center sm" style="margin-top:3px">${a.redes.ig?'IG @'+a.redes.ig:''}${a.redes.ig&&a.redes.tt?' · ':''}${a.redes.tt?'TikTok @'+a.redes.tt:''}</div>`:''}`);
}
function imprimirCorte(c){

    <div class="row sm"><span>Cierre</span><span>${new Date(c.cierreFecha).toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>
    <div class="row sm"><span>${c.aperturaPor||''}</span><span>${c.cierrePor||''}</span></div><hr>
    <div class="row"><span>Fondo inicial</span><span>$${num(c.fondoInicial)}</span></div>
    <div class="row"><span>Ventas</span><span>$${num(c.ventas)}</span></div>
    <div class="row"><span>Ingresos efectivo</span><span>$${num(c.ingresosEfectivo)}</span></div>
    <div class="row"><span>Egresos</span><span>$${num(c.egresos)}</span></div><hr>
    <div class="row b"><span>Esperado</span><span>$${num(c.esperado)}</span></div>
    <div class="row b"><span>Contado</span><span>$${num(c.contado)}</span></div>
    <div class="row b big"><span>Diferencia</span><span>$${num(c.diferencia)}</span></div>`);

/* =====================================================================
   FIREBASE: CONEXIÓN, AUTENTICACIÓN, SINCRONIZACIÓN
   ===================================================================== */
function getConfig(){
  if(FIREBASE_CONFIG && FIREBASE_CONFIG.projectId) return FIREBASE_CONFIG;
  try{ const c=localStorage.getItem('cima_fb_config'); if(c){ const p=JSON.parse(c); if(p.projectId) return p; } }catch(e){}
  return null;
}
function initFirebase(cfg){
  if(typeof firebase==='undefined'){
    toast('No se pudo cargar Firebase. Revisa tu conexión a internet e intenta de nuevo.','peligro');
    console.error('El SDK de Firebase no cargó (window.firebase es undefined). Puede ser un bloqueo de red hacia gstatic.com.');
    return false;
  }
  try{
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    db=firebase.firestore(); auth=firebase.auth();
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    auth.onAuthStateChanged(async u=>{
      if(u){
        Store.mode='firebase';
        try{
          const snap=await db.collection('menu').limit(1).get();
          const nubeVacia=snap.empty;
          if(nubeVacia && (DB.data.menu.length||DB.data.inventario.length||DB.data.ordenes.length)){
            subirTodoAFirebase(); toast('Subiendo tus datos a la nube por primera vez…');
          }
        }catch(e){ console.error(e); }
        iniciarListeners();
      }
      else { Store.mode='local'; }
      actualizarSyncInd();
      if($('#roleScreen') && !$('#roleScreen').classList.contains('hidden')) initRolScreen();
    });
    return true;
  }catch(e){ console.error(e); toast('Config de Firebase inválida','peligro'); return false; }
}
let listenersOn=false;
function iniciarListeners(){
  if(listenersOn || !db) return; listenersOn=true;
  db.collection('meta').doc('ajustes').onSnapshot(s=>{ if(s.exists){ DB.data.ajustes={...DB.data.ajustes,...s.data()}; afterSync(); } }, fbErr);
  db.collection('meta').doc('counters').onSnapshot(s=>{ if(s.exists && s.data().folio) DB.data.folio=s.data().folio; }, ()=>{});
  db.collection('meta').doc('caja').onSnapshot(s=>{ if(s.exists){ DB.data.cajaActual=s.data().actual||null; DB.data.cajas=s.data().historial||[]; afterSync(); } }, ()=>{});
  ['categorias','inventario','menu','ordenes','movimientos'].forEach(col=>{
    db.collection(col).onSnapshot(snap=>{ DB.data[col]=snap.docs.map(x=>x.data()); afterSync(); }, fbErr);
  });
}
function afterSync(){
  persistLocal(); actualizarSyncInd();
  if(estado.rol && !estado.ordenBorrador && !$('#overlay')){ construirNav(); render(); }
}
function abrirConfigSync(){
  const actual=getConfig();
  modal({ wide:true, titulo:'Configurar sincronización',
    cuerpo:`<p class="hint" style="margin-bottom:14px">Pega aquí la configuración de tu proyecto Firebase. Puedes pegar el bloque completo tal como te lo muestra Firebase (con los <code>import</code>, comentarios, etc.) — el sistema encuentra solo la parte que necesita, no hace falta recortar nada.</p>
      <div class="field"><label>Configuración (firebaseConfig)</label><textarea class="input" id="fbCfg" style="min-height:150px;font-family:var(--font-mono,monospace);font-size:13px" placeholder='{\n  "apiKey": "...",\n  "authDomain": "tu-proyecto.firebaseapp.com",\n  "projectId": "tu-proyecto",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}'>${actual?JSON.stringify(actual,null,2):''}</textarea></div>
      <div class="hint">Tras guardar, inicia sesión con la cuenta de tu restaurante (creada en Firebase → Authentication).</div>`,
    guardarTexto:'Guardar y conectar',
    guardar:()=>{
      const raw=$('#fbCfg').value.trim();
      if(!raw){ toast('Pega primero tu configuración de Firebase','peligro'); return; }
      let cfg=null, errores=[];
      // Intento 1: JSON válido tal cual (por si ya viene con comillas en las llaves)
      try{ cfg=JSON.parse(raw); }catch(e){ errores.push('JSON directo: '+e.message); }
      // Intento 2: extraer solo el objeto { ... } de firebaseConfig, ignorando todo lo demás
      // (imports, comentarios, initializeApp, getAnalytics, etc. que Firebase agrega alrededor).
      // Cuenta llaves respetando comillas para hallar el cierre exacto del objeto.
      if(!cfg){
        try{
          const marca=raw.indexOf('firebaseConfig');
          let ini=raw.indexOf('{', marca>=0?marca:0);
          if(ini<0) ini=raw.indexOf('{');
          if(ini>=0){
            let depth=0, enStr=false, strCh='', esc=false, fin=-1;
            for(let i=ini;i<raw.length;i++){
              const ch=raw[i];
              if(enStr){ if(esc) esc=false; else if(ch==='\\') esc=true; else if(ch===strCh) enStr=false; }
              else{
                if(ch==='"'||ch==="'"||ch==='`'){ enStr=true; strCh=ch; }
                else if(ch==='{') depth++;
                else if(ch==='}'){ depth--; if(depth===0){ fin=i+1; break; } }
              }
            }
            if(fin>0){ const obj=(new Function('return ('+raw.slice(ini,fin)+')'))(); if(obj&&typeof obj==='object') cfg=obj; }
          }
        }catch(e){ errores.push('Extracción de objeto: '+e.message); }
      }
      // Intento 3: todo el texto es un literal de objeto de JS (const firebaseConfig = {...};) sin nada más alrededor
      if(!cfg){
        try{
          let txt=raw.replace(/^\s*(const|let|var)\s+\w+\s*=\s*/,'').replace(/;?\s*$/,'');
          const obj=(new Function('return ('+txt+')'))();
          if(obj && typeof obj==='object') cfg=obj;
        }catch(e){ errores.push('Objeto JS completo: '+e.message); }
      }
      if(!cfg){ toast('No pude leer la configuración. Revisa que esté completa y sin cortar.','peligro'); console.error('Config Firebase — no se pudo interpretar:', errores); return; }
      if(!cfg.projectId||!cfg.apiKey){ toast('Falta projectId o apiKey en la configuración','peligro'); return; }
      localStorage.setItem('cima_fb_config', JSON.stringify(cfg)); FIREBASE_CONFIG=cfg;
      cerrarModal();
      if(initFirebase(cfg)){ toast('Conectando…'); setTimeout(abrirLogin, 500); }
      else { toast('No se pudo iniciar Firebase con esos datos','peligro'); }
    } });
}
function abrirLogin(){
  if(!auth){ toast('Primero configura Firebase','peligro'); return; }
  if(auth.currentUser){ toast('Ya hay sesión iniciada'); if(estado.rol){ construirNav(); render(); } return; }
  modal({ titulo:'Iniciar sesión',
    cuerpo:`<p class="hint" style="margin-bottom:14px">Usa la cuenta de tu restaurante. Se crea una vez en Firebase → Authentication (correo y contraseña).</p>
      <div class="field"><label>Correo</label><input class="input" id="logEmail" type="email" placeholder="restaurante@cimacafe.com"></div>
      <div class="field"><label>Contraseña</label><input class="input" id="logPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')hacerLogin()"></div>`,
    guardarTexto:'Entrar', guardar:hacerLogin });
}
function hacerLogin(){
  const email=$('#logEmail').value.trim(), pass=$('#logPass').value;
  if(!email||!pass){ toast('Faltan datos','peligro'); return; }
  auth.signInWithEmailAndPassword(email,pass).then(()=>{ cerrarModal(); toast('Sesión iniciada · sincronizando'); initRolScreen(); if(estado.rol){ construirNav(); render(); } })
    .catch(e=>{ toast('No se pudo entrar: '+(e.code||e.message),'peligro'); });
}
function cerrarSesion(){ if(auth) auth.signOut().then(()=>{ Store.mode='local'; listenersOn=false; actualizarSyncInd(); initRolScreen(); if(estado.rol){ construirNav(); render(); } toast('Sesión cerrada'); }); }
function subirTodoAFirebase(){ if(!fbReady()) return; const d=DB.data;
  saveAjustes(); saveCaja(); ['categorias','inventario','menu','ordenes','movimientos'].forEach(col=>d[col].forEach(x=>db.collection(col).doc(x.id).set(x).catch(fbErr))); }
function borrarTodoFirebase(){ if(!fbReady()) return;
  ['categorias','inventario','menu','ordenes','movimientos'].forEach(col=>db.collection(col).get().then(s=>s.forEach(doc=>doc.ref.delete())).catch(()=>{}));
  db.collection('meta').doc('ajustes').set(DB.data.ajustes).catch(()=>{}); db.collection('meta').doc('caja').set({actual:null,historial:[]}).catch(()=>{}); }

/* =====================================================================
   MODAL GENÉRICO
   ===================================================================== */
function modal({titulo,cuerpo,guardar,guardarTexto='Guardar',wide=false,sinGuardar=false}){
  cerrarModal();
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='overlay';
  ov.onclick=e=>{ if(e.target===ov) cerrarModal(); };
  ov.innerHTML=`<div class="modal ${wide?'wide':''}"><div class="modal-head"><h2>${titulo}</h2><button class="btn-icon" onclick="cerrarModal()">${svg(I.x,20)}</button></div><div class="modal-body">${cuerpo}</div>${sinGuardar?'':`<div class="modal-foot"><button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="modalSave">${guardarTexto}</button></div>`}</div>`;
  document.body.appendChild(ov); if(guardar) $('#modalSave').onclick=guardar;
}
function cerrarModal(){ const o=$('#overlay'); if(o) o.remove(); }
function confirmar(msg,fn){ modal({titulo:'Confirmar',cuerpo:`<p style="line-height:1.6">${msg}</p>`,guardarTexto:'Sí, continuar',guardar:()=>{ cerrarModal(); fn(); }}); }

/* =====================================================================
   PWA: instalación + service worker
   ===================================================================== */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; mostrarBotonInstalar(); });
function mostrarBotonInstalar(){
  const foot=$('#roleFoot'); if(!foot||foot.querySelector('.installBtn')) return;
  const b=document.createElement('button'); b.className='installBtn'; b.onclick=instalarPWA;
  b.innerHTML=svg(I.install,16)+'<span>Instalar app</span>'; foot.appendChild(b);
}
function instalarPWA(){ if(!deferredPrompt) { toast('Usa el menú del navegador → "Agregar a pantalla de inicio"'); return; } deferredPrompt.prompt(); deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; }); }
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

/* =====================================================================
   ARRANQUE
   ===================================================================== */
window.addEventListener('error', e=>{ console.error('Error:',e.error||e.message); try{ toast('Ocurrió un detalle; si algo no cargó, vuelve a intentarlo','peligro'); }catch(_){} });
window.addEventListener('unhandledrejection', e=>{ console.error('Promesa:',e.reason); });
DB.load();
const cfg=getConfig();
if(cfg){ FIREBASE_CONFIG=cfg; initFirebase(cfg); }
initRolScreen();
setInterval(()=>{ if(estado.rol && (estado.vista==='cocina'||estado.vista==='ordenes') && !estado.ordenBorrador && !$('#overlay')){ if(Store.mode!=='firebase'){ DB.load(); } construirNav(); render(); } }, 15000);
</script>
